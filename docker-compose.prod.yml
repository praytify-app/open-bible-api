## Open Bible API — Production Docker Compose (Dokploy)
##
## Required env vars in Dokploy:
##   DATABASE_URL   — PostgreSQL connection string
##   ADMIN_TOKEN    — Secret token for admin endpoints
##   API_DOMAIN     — e.g. praytify.bible
##   CORS_ORIGINS   — Allowed origins (e.g. https://praytify.app)

services:
  api:
    image: novashock/open-bible-api:1.2.0
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3100
      - HOST=0.0.0.0
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://praytify.app}
      - RATE_LIMIT=${RATE_LIMIT:-100}
    labels:
      - traefik.enable=true
      - traefik.http.routers.bible-api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.bible-api.entrypoints=websecure
      - traefik.http.routers.bible-api.tls.certresolver=letsencrypt
      - traefik.http.services.bible-api.loadbalancer.server.port=3100
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
